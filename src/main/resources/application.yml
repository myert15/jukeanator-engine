# src/main/resources/application.yml

app:
  jwt:
    secret: fT7mK9xQ2pNc8VdL4sHz1YwB6rAe3JkM0uCp5GqX8nRv2ZtF7hLs9Wd3YbKm6QaP
    expiration-ms: 86400000   # 24 hours
    
spring:
  application:
    name: JukeANator

song-library:
  repository-type: filesystem   # filesystem | postgres
  #root-path: R:\\Rock_On_Third # windows
  root-path: /mnt/readyNAS/Rock_On_Third # linux
  requires-metadata: false
  use-genre: true
  use-top-folder-for-genre: true
  discogs:
    consumer-key: vBSFEvNtGflHQnULBNnL
    consumer-secret: AOOYhlvSshYkJieLRrdTCUoLcsWACfWW
  accepted-song-file-extensions:
    - .mp3
    - .flac
    - .wav
  search-result-size: 50    

song-queue:
  repository-type: filesystem   # filesystem | postgres
  #root-path: R:\\Rock_On_Third # windows
  root-path: /mnt/readyNAS/Rock_On_Third # linux
  enable-background-music: true
  minimum-number-songs-to-keep-in-queue: 5 # Only used when enableBackgroundMusic is true
  minimum-minutes-between-song-plays: 60
  allow-explicit-songs-at-all-times: false
  allow-explicit-songs-begin: 21 # In 24 hour/military time (e.g. 21:00 hours is 9:00PM) Only used when allowExplicitSongsAtAllTimes is false
  allow-explicit-songs-end: 5 # In 24 hour/military time (e.g. 5:00 hours is 5:00AM) Only used when allowExplicitSongsAtAllTimes is false
      
song-player:  
  player-type: vlc   # vlc or detached-vlc (all operating systems) | winamp (windows only)
  volume: 100 # 0: Completely muted 100: 100% of the normal volume 200: 200% volume (up to 2x software amplification)

user:
  repository-type: filesystem   # filesystem | postgres
  #root-path: R:\\Rock_On_Third # windows
  root-path: /mnt/readyNAS/Rock_On_Third # linux
  
user-interface:
  enabled: true   # if true, a JFC/Swing UI is launched, otherwise, a headless backend
  enable-screen-saver: false
  #
  # CREDIT CONFIGURATION
  #
  increment-credits-key: a
  num-credits: 0
  priority-cost-multiplier: 2
  credits-per-dollar: 3
  five-dollar-bonus-credits: 3
  ten-dollar-bonus-credits: 10
  #SEARCH CONFIGURATION
  enable-type-ahead-search: true
